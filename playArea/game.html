<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">
    <!-- オリジナルCSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="background">
        <div class="play-header">
            <div class="p1-area">
                <h2 id="p1name">PLAYER 1</h2>
                    <div class="HPbar">
                        <div id="p1-hp"></div>
                    </div>
            </div> 
            <div id="goal" class="goal">
                <p id="goal-time">05.00</p>
            </div>
            <div class="p2-area">
                <h2 id="p2name">PLAYER 2</h2>
                <div class="HPbar">
                    <div id="p2-hp"></div>
                </div>
            </div>
        </div>
        <div class="play-area">
            <div class="player-display">
                <img id="p1-char-img" class="character" src="../img/player1.png" alt="1Pキャラ">
                <div id="p1time" class="player_time">00.00</div>
                <button id="p1skillbtn" class="p1skill" disabled>スキル</button>
            </div>
            <div id="center" class="stopwatch">
                <span>
                    <p id="score-board">0 - 0</p>
                </span>
                <div id="stopwatch" class="time">00.00</div>
                <section>
                    <button id="startbtn">&#x25b6</button>
                    <button id="stopbtn" disabled>&#x23f9</button>
                </section>
            </div>
            <div class="player-display">
                <img id="p2-char-img" class="character" src="../img/player2.png" alt="2Pキャラ">
                <div id="p2time" class="player_time">00.00</div>
                <button id="p2skillbtn" class="p2skill" disabled>スキル</button>
            </div>
        </div>
        <div class="commentarea">
            <p id="comment1"></p>
            <p id="comment2"></p>
        </div>
    </section>
    <script src="main.js"></script>
</body>
</html>
